name: Build and Push Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------- BACKEND ----------
      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/py-backend:${{ github.sha }} ./backend

      - name: Tag backend as latest
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/py-backend:${{ github.sha }} \
                     ${{ secrets.DOCKER_USERNAME }}/py-backend:latest

      - name: Push backend images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/py-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/py-backend:latest

      # ---------- FRONTEND ----------
      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/py-frontend:${{ github.sha }} ./frontend

      - name: Tag frontend as latest
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/py-frontend:${{ github.sha }} \
                     ${{ secrets.DOCKER_USERNAME }}/py-frontend:latest

      - name: Push frontend images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/py-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/py-frontend:latest